<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>MISTO HR AI AGENT · Compact Guidebook Chat</title>
  <style>
    @font-face{font-family:localFallback;src:local("Malgun Gothic");}
    :root{
      --red:#e30613;--navy:#10233f;--ink:#101828;--muted:#667085;--line:rgba(16,35,63,.12);
      --soft:#f7f9fc;--white:#fff;--shadow:0 22px 70px rgba(16,35,63,.14);--round:28px;
      --blue:#2f6df6;--peach:#ffb59f;--cyan:#39bfd3;--purple:#bda0ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{
      margin:0;color:var(--ink);
      font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",localFallback,Arial,sans-serif;
      background:
        radial-gradient(circle at 0% 10%,rgba(255,181,159,.36),transparent 32%),
        radial-gradient(circle at 100% 2%,rgba(57,191,211,.28),transparent 30%),
        radial-gradient(circle at 50% 100%,rgba(189,160,255,.22),transparent 38%),
        linear-gradient(135deg,#fff8f6 0%,#f8fbff 48%,#ffffff 100%);
      word-break:keep-all;-webkit-font-smoothing:antialiased;
    }
    button,input,select{font-family:inherit}
    .app{height:100vh;width:100vw;padding:24px;display:grid;grid-template-columns:minmax(320px,410px) minmax(680px,1fr);gap:22px}
    .brand{
      min-width:0;height:calc(100vh - 48px);border-radius:var(--round);padding:26px;
      background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);backdrop-filter:blur(16px);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .kicker{display:inline-flex;width:max-content;gap:8px;align-items:center;border-radius:999px;background:#fff0f1;color:var(--red);font-size:12px;font-weight:950;padding:8px 11px;border:1px solid rgba(227,6,19,.12)}
    .brand h1{margin:20px 0 0;color:var(--navy);font-size:42px;line-height:.96;letter-spacing:-.075em;font-weight:950}
    .brand h1 span{display:block;background:linear-gradient(90deg,var(--red),#ff824a,var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
    .desc{margin:17px 0 18px;color:#475467;font-size:14px;line-height:1.62;font-weight:700}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
    .stat{border:1px solid var(--line);background:rgba(255,255,255,.74);border-radius:18px;padding:13px 14px}
    .stat b{display:block;color:var(--navy);font-size:24px;letter-spacing:-.04em;line-height:1}
    .stat span{display:block;margin-top:5px;color:var(--muted);font-size:11px;font-weight:950}
    .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .tools button{border:1px solid var(--line);background:#fff;border-radius:15px;padding:11px 10px;color:#344054;font-size:12px;font-weight:950;cursor:pointer}
    .tools button:hover{border-color:rgba(227,6,19,.28);color:var(--red);transform:translateY(-1px)}
    .searchBox{display:grid;gap:8px;margin-bottom:12px}
    .searchBox input,.searchBox select{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;outline:none;color:#344054;font-size:13px;font-weight:800}
    .searchBox input:focus,.searchBox select:focus{border-color:rgba(47,109,246,.45);box-shadow:0 0 0 4px rgba(47,109,246,.08)}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 12px;max-height:76px;overflow:auto;padding-right:4px}
    .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 9px;color:#475467;font-size:11px;font-weight:950;cursor:pointer;white-space:nowrap}
    .chip.active,.chip:hover{background:#fff0f1;color:var(--red);border-color:rgba(227,6,19,.24)}
    .processList{flex:1;min-height:0;overflow:auto;display:grid;gap:7px;padding-right:4px}
    .processBtn{text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.82);border-radius:15px;padding:10px 12px;cursor:pointer;color:#344054;transition:.14s}
    .processBtn:hover{background:#fff;box-shadow:0 10px 22px rgba(16,35,63,.07);border-color:rgba(47,109,246,.22)}
    .processBtn strong{display:block;color:var(--navy);font-size:13px;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .processBtn span{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat{
      min-width:0;height:calc(100vh - 48px);border-radius:var(--round);overflow:hidden;
      background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.84);box-shadow:var(--shadow);backdrop-filter:blur(16px);
      display:flex;flex-direction:column;
    }
    .chatHead{display:flex;align-items:center;gap:12px;padding:16px 19px;background:linear-gradient(135deg,var(--navy),#263f72);color:#fff}
    .avatar{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--red),#ff9a5a);display:grid;place-items:center;font-weight:950;letter-spacing:-.02em;flex:0 0 auto}
    .chatHead strong{display:block;font-size:17px;letter-spacing:-.03em}
    .chatHead span{display:block;margin-top:3px;color:#dbeafe;font-size:11px;font-weight:850}
    .status{margin-left:auto;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);padding:7px 10px;font-size:11px;font-weight:950;white-space:nowrap}
    .answerWrap{flex:1;min-height:0;padding:18px;background:linear-gradient(180deg,rgba(247,249,252,.82),rgba(255,255,255,.58));display:grid;grid-template-rows:auto 1fr;gap:12px;overflow:hidden}
    .questionBar{min-height:46px;border:1px solid var(--line);background:rgba(255,255,255,.86);border-radius:18px;padding:12px 15px;color:#344054;font-size:13px;font-weight:900;display:flex;align-items:center;gap:10px}
    .questionBar b{color:var(--red);font-size:12px;white-space:nowrap}
    .questionBar span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .answerCard{
      min-height:0;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px 22px;
      box-shadow:0 16px 38px rgba(16,35,63,.08);line-height:1.55;
    }
    .answerTitle{margin:0 0 8px;color:var(--navy);font-size:24px;line-height:1.18;letter-spacing:-.055em;font-weight:950}
    .summary{margin:0 0 13px;color:#344054;font-size:14.5px;font-weight:700}
    .infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0 13px}
    .info{border:1px solid var(--line);background:#f9fafb;border-radius:16px;padding:11px 12px;min-width:0}
    .info b{display:block;color:var(--navy);font-size:11px;margin-bottom:4px;letter-spacing:-.01em}
    .info span{display:block;color:#344054;font-size:13px;font-weight:800;line-height:1.45}
    .compactSection{margin-top:10px;border:1px solid var(--line);border-radius:17px;background:#fff;overflow:hidden}
    .sectionLabel{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0;padding:11px 13px;background:#f7f9fc;color:var(--navy);font-size:13px;font-weight:950;letter-spacing:-.02em}
    .steps{margin:0;padding:10px 12px 12px 33px;color:#344054;font-size:13.2px;font-weight:700}
    .steps li{margin:3px 0}
    details.compactSection summary{cursor:pointer;list-style:none}
    details.compactSection summary::-webkit-details-marker{display:none}
    details.compactSection summary::after{content:'열기';font-size:10px;color:#667085;background:#fff;border:1px solid var(--line);padding:4px 7px;border-radius:999px}
    details.compactSection[open] summary::after{content:'닫기'}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:13px}
    .meta span{display:inline-flex;align-items:center;border-radius:999px;background:#f2f4f7;color:#475467;font-size:10.5px;font-weight:950;padding:6px 8px}
    .related{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
    .related button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 9px;margin:0 5px 5px 0;color:#475467;font-size:11px;font-weight:900;cursor:pointer}
    .related button:hover{color:var(--red);border-color:rgba(227,6,19,.25)}
    .linkRow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 12px}
    .linkBtn{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(227,6,19,.18);background:#fff6f6;color:var(--red);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:950;text-decoration:none}
    .linkBtn:hover{background:#ffe9eb;border-color:rgba(227,6,19,.36)}
    .linkBtn small{color:#8a1020;font-weight:850;opacity:.78}
    .tagMini{display:inline-flex;margin-left:6px;border-radius:999px;background:#eef4ff;color:#2f6df6;padding:3px 7px;font-size:10px;font-weight:950}

    .allGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
    .allGroup{border:1px solid var(--line);border-radius:17px;background:#fff;overflow:hidden}
    .allGroup h3{margin:0;padding:10px 12px;background:#f7f9fc;color:var(--navy);font-size:13px}
    .allGroup ul{margin:0;padding:10px 12px 11px 28px;color:#344054;font-size:12.5px;font-weight:750}
    .allGroup li{margin:3px 0}
    .composer{display:flex;gap:10px;padding:15px 17px;background:rgba(255,255,255,.84);border-top:1px solid var(--line)}
    .composer input{flex:1;min-width:0;border:1px solid var(--line);border-radius:17px;padding:14px 16px;font-size:14px;outline:none;background:#fff;color:#344054;font-weight:760}
    .composer input:focus{border-color:rgba(47,109,246,.42);box-shadow:0 0 0 4px rgba(47,109,246,.08)}
    .composer button{border:0;border-radius:17px;background:var(--navy);color:#fff;font-weight:950;padding:0 24px;cursor:pointer}
    .composer button:hover{background:#1d355c}
    .toast{position:fixed;right:26px;bottom:26px;background:var(--navy);color:#fff;padding:12px 14px;border-radius:14px;font-size:12px;font-weight:900;box-shadow:0 18px 38px rgba(16,35,63,.24);opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:980px){html,body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr;padding:14px;gap:14px}.brand,.chat{height:auto}.brand{max-height:none}.processList{max-height:260px}.chat{min-height:680px}.answerWrap{min-height:540px}.allGrid,.infoGrid{grid-template-columns:1fr}}
    @media(max-width:560px){.brand h1{font-size:34px}.chatHead .status{display:none}.composer{flex-direction:column}.composer button{height:48px}.answerCard{padding:17px}.answerTitle{font-size:21px}}
    @media print{html,body{overflow:visible;background:#fff}.app{display:block;height:auto;padding:0}.brand,.composer,.toast,.questionBar,.chatHead .status{display:none!important}.chat{height:auto;box-shadow:none;border:0;border-radius:0}.chatHead{background:#fff;color:#111;border-bottom:2px solid #111}.answerWrap{display:block;padding:0;background:#fff}.answerCard{box-shadow:none;border:0;overflow:visible}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="brand">
      <div class="kicker">Guidebook Only · V5 Data</div>
      <h1>MISTO HR <span>AI AGENT</span></h1>
      <p class="desc">V4 레이아웃은 유지하고, 가이드북 화면 단계와 바로가기 링크를 보강한 <b>V5 실무형 버전</b>입니다.</p>

    </main>
  </div>
  <div class="toast" id="toast">복사했습니다.</div>

function processText(p){

  const cautions = p.cautions?.length ? `<details class="compactSection"><summary class="sectionLabel">주의사항</summary>${listItems(p.cautions,'ul')}</details>` : '';
  return `<h2 class="answerTitle">${esc(p.title)}<span class="tagMini">V5</span></h2><p class="summary">${esc(p.conclusion)}</p>${links}<div class="infoGrid"><div class="info"><b>처리 경로</b><span>${esc(p.path||'가이드북 해당 항목 확인')}</span></div><div class="info"><b>담당/근거</b><span>${esc(p.owner||'가이드북 해당 항목 확인')} · ${esc(p.source)}</span></div></div>${steps}${screen}${rules}${cases}${cautions}<div class="meta"><span>${esc(p.category)}</span><span>${esc(p.page)}</span><span>Guidebook Only</span></div>`;
}
function tokenize(q){return String(q).toLowerCase().replace(/[^\uAC00-\uD7A3a-zA-Z0-9]+/g,' ').split(/\s+/).filter(Boolean);}
function score(p,q){const lower=q.toLowerCase();let s=0;const hay=[p.title,p.category,p.conclusion,p.path,p.page,p.owner,p.source,...(p.keywords||[]),...(p.links||[]).map(l=>l.label+' '+l.note+' '+l.url),...(p.screenSteps||[]),...(p.rules||[]),...(p.cases||[]),...(p.cautions||[])].join(' ').toLowerCase();if(lower.includes(p.title.toLowerCase()))s+=22;if(lower.includes(p.category.toLowerCase()))s+=4;for(const k of (p.keywords||[])){const kk=String(k).toLowerCase();if(lower.includes(kk))s+=9;}for(const t of tokenize(q)){if(p.title.toLowerCase().includes(t))s+=5;if(p.conclusion.toLowerCase().includes(t))s+=2;if((p.path||'').toLowerCase().includes(t))s+=2;if(hay.includes(t))s+=3;}return s;}
function findBest(q){return PROCESSES.map(p=>[score(p,q),p]).filter(x=>x[0]>0).sort((a,b)=>b[0]-a[0]);}
function allProcessAnswer(){
  const grouped=CATEGORIES.map(cat=>`<div class="allGroup"><h3>${esc(cat)}</h3><ul>${PROCESSES.filter(p=>p.category===cat).map(p=>`<li><b>${esc(p.title)}</b> <span style="color:#667085">${esc(p.page)}</span></li>`).join('')}</ul></div>`).join('');
  const plain=CATEGORIES.map(cat=>cat+'\n'+PROCESSES.filter(p=>p.category===cat).map(p=>`- ${p.title} (${p.page})`).join('\n')).join('\n\n');
  return [`<h2 class="answerTitle">가이드북 전체 프로세스 목록</h2><p class="summary">총 ${PROCESSES.length}개 항목입니다. 왼쪽 검색창에서 키워드로 좁히거나 항목명을 질문하면 해당 프로세스를 바로 보여줍니다.</p><div class="allGrid">${grouped}</div><div class="meta"><span>Guidebook Only</span><span>총 ${PROCESSES.length}개 항목</span></div>`, plain];
}
function safeAnswer(){return `<h2 class="answerTitle">민감정보는 이 화면에 입력하지 마세요.</h2><p class="summary">주민등록번호, 계좌번호, 카드번호, 비밀번호 등은 공식 시스템 또는 회사 지정 경로에만 입력해야 합니다.</p><div class="infoGrid"><div class="info"><b>처리 방식</b><span>질문에서 업무명만 남기고 다시 입력해주세요.</span></div><div class="info"><b>예시</b><span>“제증명 발급 방법 알려줘”, “아톡비즈 설치 방법 알려줘”</span></div></div><div class="meta"><span>보안 입력 차단</span><span>Guidebook Only</span></div>`;}
function ask(q){const text=(q||input.value).trim(); if(!text)return; input.value=''; setQuestion(text,'QUESTION');
  if(sensitive.test(text)){setAnswer(safeAnswer(),'민감정보는 공식 시스템 또는 회사 지정 경로에만 입력해야 합니다.');return;}
  if(/전체|목록|모든|프로세스 전부|all/i.test(text)){const [h,plain]=allProcessAnswer();setAnswer(h,plain);return;}
  const matches=findBest(text);
  if(!matches.length){const [h,plain]=allProcessAnswer();setAnswer(`<h2 class="answerTitle">매칭되는 항목을 찾지 못했습니다.</h2><p class="summary">질문을 ‘연차’, ‘법인카드’, ‘밀케어’, ‘제증명’, ‘담당자’처럼 가이드북 항목명 중심으로 다시 입력해 주세요.</p>${h.replace('<h2 class="answerTitle">가이드북 전체 프로세스 목록</h2>','')}`,plain);return;}
  const p=matches[0][1];
  const rel=matches.slice(1,4).map(x=>x[1]).filter(x=>x.id!==p.id);
  let related='';
  if(rel.length) related=`<div class="related"><div class="sectionLabel" style="border-radius:14px;margin-bottom:8px">관련 항목</div>${rel.map(r=>`<button type="button" data-rel="${esc(r.id)}">${esc(r.title)} · ${esc(r.page)}</button>`).join('')}</div>`;
  setAnswer(renderAnswer(p)+related,processText(p));
  answerCard.querySelectorAll('[data-rel]').forEach(btn=>btn.addEventListener('click',()=>{const r=PROCESSES.find(x=>x.id===btn.dataset.rel);if(r){setQuestion(r.title,'RELATED');setAnswer(renderAnswer(r),processText(r));}}));
}
function renderList(){
  const q=(search.value||'').toLowerCase().trim(); const cat=category.value||activeCat;
  const list=PROCESSES.filter(p=>(!cat||p.category===cat)&&(!q||[p.category,p.title,p.conclusion,p.page,p.path,...p.keywords,...(p.links||[]).map(l=>l.label+' '+l.note+' '+l.url),...(p.screenSteps||[]),...(p.rules||[])].join(' ').toLowerCase().includes(q)));
  processList.innerHTML=list.map(p=>`<button class="processBtn" data-id="${esc(p.id)}"><strong>${esc(p.title)}</strong><span>${esc(p.category)} · ${esc(p.page)} · ${esc(p.owner||'가이드북')}</span></button>`).join('') || `<button class="processBtn"><strong>검색 결과 없음</strong><span>다른 키워드로 검색해 주세요.</span></button>`;
  processList.querySelectorAll('[data-id]').forEach(btn=>btn.addEventListener('click',()=>{const p=PROCESSES.find(x=>x.id===btn.dataset.id);if(p){setQuestion(p.title,'SELECT');setAnswer(renderAnswer(p),processText(p));}}));
}
function renderFilters(){
  category.innerHTML='<option value="">전체 카테고리</option>'+CATEGORIES.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  chips.innerHTML=`<button class="chip active" data-cat="">전체</button>`+CATEGORIES.map(c=>`<button class="chip" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
  chips.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{activeCat=btn.dataset.cat;category.value=activeCat;chips.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();}));
}
function init(){
  $('processCount').textContent=PROCESSES.length;renderFilters();renderList();setQuestion('', 'READY');
  setAnswer(`<h2 class="answerTitle">안녕하세요. MISTO HR Assistant입니다.</h2><p class="summary">이번 V4는 채팅 기록을 계속 쌓지 않고, <b>최신 질문과 최신 답변만</b> 한 화면에 고정해서 보여줍니다.</p><div class="infoGrid"><div class="info"><b>사용 방식</b><span>왼쪽 프로세스 목록을 누르거나 아래 채팅창에 질문을 입력하세요.</span></div><div class="info"><b>답변 범위</b><span>2026 미스토코리아 가이드북에 반영된 ${PROCESSES.length}개 프로세스 기준입니다.</span></div></div><div class="meta"><span>Compact View</span><span>Guidebook Only</span><span>Local V5</span></div>`, `MISTO HR Assistant V4. 가이드북 기준 ${PROCESSES.length}개 프로세스가 반영되어 있습니다.`);
}
$('askForm').addEventListener('submit',e=>{e.preventDefault();ask();});
search.addEventListener('input',renderList); category.addEventListener('change',()=>{activeCat=category.value;chips.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===activeCat));renderList();});
$('allBtn').addEventListener('click',()=>{setQuestion('전체 프로세스 보여줘','ACTION');const [h,plain]=allProcessAnswer();setAnswer(h,plain);});
$('clearBtn').addEventListener('click',()=>{init();showToast('초기화했습니다.');});
$('copyBtn').addEventListener('click',async()=>{if(!lastBotText)return showToast('복사할 답변이 없습니다.');try{await navigator.clipboard.writeText(lastBotText);showToast('최근 답변을 복사했습니다.');}catch(e){showToast('복사 권한이 없습니다.');}});
$('printBtn').addEventListener('click',()=>window.print());
init();
</script>
</body>
